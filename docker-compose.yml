services:
  backend:
    build: ./backend
    container_name: wyqy-backend
    ports:
      - "8000:8000"
    volumes:
      - wyqy-data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/wyqy.db
      - HTTP_TIMEOUT=30
      - MAX_CONCURRENT_SCANS=10
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: wyqy-frontend
    ports:
      - "3080:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: wyqy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  wyqy-data:
  redis-data:
