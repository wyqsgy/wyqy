name: Superpowers Security Scanner CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '20'

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy app --ignore-missing-imports || true

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app || true

      - name: Run tests
        run: |
          pip install pytest pytest-asyncio httpx
          pytest tests/ -v --tb=short || true

      - name: Verify FastAPI app
        run: python -c "from app.main import app; print('✓ FastAPI app created successfully')"

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Lint
        run: npx eslint src --ext .ts,.tsx || true

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build -t wyqy-backend:${{ github.sha }} ./backend
          docker tag wyqy-backend:${{ github.sha }} wyqy-backend:latest

      - name: Build frontend image
        run: |
          docker build -t wyqy-frontend:${{ github.sha }} ./frontend
          docker tag wyqy-frontend:${{ github.sha }} wyqy-frontend:latest

      - name: Run container health check
        run: |
          docker compose up -d
          sleep 10
          docker compose ps

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
